# Render blueprint for the Mesh AI backend.
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick the repo.
# Render reads this file, builds backend/Dockerfile, and prompts for the three
# secrets below (sync:false = not stored in git; you paste them in the dashboard).
services:
  - type: web
    name: mesh-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Free works for the Groq-powered feed AI. If skill add/craft OOMs (fastembed
    # is RAM-heavy), bump to "starter".
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
